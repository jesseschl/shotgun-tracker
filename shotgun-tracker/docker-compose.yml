version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shotgun-tracker-db
    environment:
      POSTGRES_USER: <CUSTOM>
      POSTGRES_PASSWORD: <CUSTOM>
      POSTGRES_DB: shotgun_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
