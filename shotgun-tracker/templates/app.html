<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shotgun Tracker 🍺</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%), 
                        url('/static/background.jpg?v=1') center/cover fixed;
            background-blend-mode: overlay;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #d4af37;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            flex: 1;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #d4af37;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1rem;
            color: #999;
            font-style: italic;
        }

        .logout-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: #ef5350;
            transform: scale(1.05);
        }

        .login-btn {
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            background: #e8c547;
            transform: scale(1.05);
        }

        .user-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .user-card.own-card {
            border-color: #FFD700;
        }

        .single-user-view .user-card {
            max-width: 600px;
            margin: 0 auto;
        }

        .user-name {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #d4af37;
            text-transform: capitalize;
            text-align: center;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 35px;
        }

        .stat {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 3.5rem;
            font-weight: bold;
            color: #d4af37;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 14px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-taken-inc {
            background: #4CAF50;
            color: white;
        }

        .btn-taken-inc:hover {
            background: #66BB6A;
            transform: scale(1.05);
        }

        .btn-taken-inc:active {
            transform: scale(0.95);
        }

        .btn-taken-dec {
            background: #f44336;
            color: white;
        }

        .btn-taken-dec:hover {
            background: #ef5350;
            transform: scale(1.05);
        }

        .btn-taken-dec:active {
            transform: scale(0.95);
        }

        .btn-owed-inc {
            background: #4CAF50;
            color: white;
        }

        .btn-owed-inc:hover {
            background: #66BB6A;
            transform: scale(1.05);
        }

        .btn-owed-inc:active {
            transform: scale(0.95);
        }

        .btn-owed-dec {
            background: #f44336;
            color: white;
        }

        .btn-owed-dec:hover {
            background: #ef5350;
            transform: scale(1.05);
        }

        .btn-owed-dec:active {
            transform: scale(0.95);
        }

        .btn-payoff {
            background: #d4af37;
            color: #1a1a1a;
            grid-column: 1 / -1;
            font-weight: 700;
            margin-top: 10px;
        }

        .btn-payoff:hover {
            background: #e8c547;
            transform: scale(1.03);
        }

        .btn-payoff:active {
            transform: scale(0.95);
        }

        .section-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 18px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #999;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .user-card {
                padding: 25px;
            }

            .user-name {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }

            .stats {
                gap: 15px;
            }

            .stat-value {
                font-size: 2.5rem;
            }

            button {
                padding: 12px 14px;
                font-size: 0.85rem;
            }

            header {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }

            .logout-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>🍺 SHOTGUN TRACKER 🍺</h1>
                <p class="tagline">Track shots taken and shots owed</p>
            </div>
            <div id="auth-section">
                <button class="login-btn" onclick="goToLogin()" id="loginBtn" style="display: none;">Login</button>
                <button class="logout-btn" onclick="logout()" id="logoutBtn" style="display: none;">Logout</button>
            </div>
        </header>

        <div id="app">
            <div class="loading">Loading users...</div>
        </div>
    </div>

    <script>
        class ShotgunTracker {
            constructor() {
                this.appElement = document.getElementById('app');
                this.users = [];
                this.currentUser = null;
                this.init();
            }

            async init() {
                await this.checkAuth();
                await this.loadAllUsers();
                this.render();
                // Poll for updates every 2 seconds
                setInterval(() => this.loadAllUsers(), 2000);
            }

            async checkAuth() {
                try {
                    const response = await fetch('/api/current-user');
                    if (response.ok) {
                        this.currentUser = await response.json();
                    }
                } catch (error) {
                    // Not logged in, that's okay
                }
                this.updateAuthButtons();
            }

            updateAuthButtons() {
                const loginBtn = document.getElementById('loginBtn');
                const logoutBtn = document.getElementById('logoutBtn');
                
                if (this.currentUser) {
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'inline-block';
                } else {
                    loginBtn.style.display = 'inline-block';
                    logoutBtn.style.display = 'none';
                }
            }

            async loadAllUsers() {
                try {
                    const response = await fetch('/api/users');
                    if (!response.ok) throw new Error('Failed to load users');
                    this.users = await response.json();
                } catch (error) {
                    console.error(error);
                    this.appElement.innerHTML = `<div class="error">Error loading users: ${error.message}</div>`;
                }
            }

            async updateTaken(userId, action) {
                if (!this.currentUser || this.currentUser.id !== userId) {
                    alert('You can only edit your own data');
                    return;
                }

                try {
                    const response = await fetch(`/api/users/${userId}/taken`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action, amount: 1 })
                    });
                    if (!response.ok) throw new Error('Failed to update');
                    await this.loadAllUsers();
                    this.render();
                } catch (error) {
                    console.error(error);
                }
            }

            async updateOwed(userId, action) {
                if (!this.currentUser || this.currentUser.id !== userId) {
                    alert('You can only edit your own data');
                    return;
                }

                try {
                    const response = await fetch(`/api/users/${userId}/owed`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action, amount: 1 })
                    });
                    if (!response.ok) throw new Error('Failed to update');
                    await this.loadAllUsers();
                    this.render();
                } catch (error) {
                    console.error(error);
                }
            }

            async payOff(userId) {
                if (!this.currentUser || this.currentUser.id !== userId) {
                    alert('You can only edit your own data');
                    return;
                }

                try {
                    const response = await fetch(`/api/users/${userId}/pay-off`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ amount: 1 })
                    });
                    if (!response.ok) throw new Error('Failed to pay off');
                    await this.loadAllUsers();
                    this.render();
                } catch (error) {
                    console.error(error);
                }
            }

            render() {
                if (this.users.length === 0) {
                    this.appElement.innerHTML = '<div class="loading">Loading...</div>';
                    return;
                }

                this.appElement.innerHTML = `
                    <div class="users-grid">
                        ${this.users.map(user => this.renderUserCard(user)).join('')}
                    </div>
                `;
            }

            renderUserCard(user) {
                const isOwn = this.currentUser && this.currentUser.id === user.id;
                const canEdit = isOwn;
                
                const actionsHTML = canEdit ? `
                    <div class="actions">
                        <div class="section-label">Shotguns Taken</div>
                        <div class="action-group">
                            <button class="btn-taken-inc" id="taken-inc-${user.id}">+ Add</button>
                            <button class="btn-taken-dec" id="taken-dec-${user.id}">- Remove</button>
                        </div>

                        <div class="section-label">Shotguns Owed</div>
                        <div class="action-group">
                            <button class="btn-owed-inc" id="owed-inc-${user.id}">+ Add</button>
                            <button class="btn-owed-dec" id="owed-dec-${user.id}">- Remove</button>
                        </div>

                        <button class="btn-payoff" id="payoff-${user.id}">💰 Pay Off 1 Shotgun</button>
                    </div>
                ` : '';

                return `
                    <div class="user-card ${isOwn ? 'own-card' : ''}">
                        <div class="user-name">${user.username.toUpperCase()} ${isOwn ? '👤' : ''}</div>
                        
                        <div class="stats">
                            <div class="stat">
                                <div class="stat-label">Taken</div>
                                <div class="stat-value">${user.taken}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">Owed</div>
                                <div class="stat-value">${user.owed}</div>
                            </div>
                        </div>

                        ${actionsHTML}
                    </div>
                `;
            }

            attachEventListeners() {
                this.users.forEach(user => {
                    const incButton = document.getElementById(`taken-inc-${user.id}`);
                    const decButton = document.getElementById(`taken-dec-${user.id}`);
                    const owedIncButton = document.getElementById(`owed-inc-${user.id}`);
                    const owedDecButton = document.getElementById(`owed-dec-${user.id}`);
                    const payoffButton = document.getElementById(`payoff-${user.id}`);

                    incButton?.addEventListener('click', () => this.updateTaken(user.id, 'increment'));
                    decButton?.addEventListener('click', () => this.updateTaken(user.id, 'decrement'));
                    owedIncButton?.addEventListener('click', () => this.updateOwed(user.id, 'increment'));
                    owedDecButton?.addEventListener('click', () => this.updateOwed(user.id, 'decrement'));
                    payoffButton?.addEventListener('click', () => this.payOff(user.id));
                });
            }

            render() {
                if (this.users.length === 0) {
                    this.appElement.innerHTML = '<div class="loading">Loading...</div>';
                    return;
                }

                this.appElement.innerHTML = `
                    <div class="users-grid">
                        ${this.users.map(user => this.renderUserCard(user)).join('')}
                    </div>
                `;

                this.attachEventListeners();
            }
        }

        let tracker;

        // Initialize the app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            tracker = new ShotgunTracker();
        });

        function goToLogin() {
            window.location.href = '/login';
        }

        function logout() {
            fetch('/logout', { method: 'POST' }).then(() => {
                window.location.href = '/';
            });
        }
    </script>
</body>
</html>
