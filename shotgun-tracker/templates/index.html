<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shotgun Tracker 🍺</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%), 
                        url('/static/background.jpg?v=1') center/cover fixed;
            background-blend-mode: overlay;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #d4af37;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #d4af37;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1rem;
            color: #999;
            font-style: italic;
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .user-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.2);
        }

        .user-name {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #d4af37;
            text-transform: capitalize;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #d4af37;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-taken-inc {
            background: #4CAF50;
            color: white;
        }

        .btn-taken-inc:hover {
            background: #66BB6A;
            transform: scale(1.05);
        }

        .btn-taken-dec {
            background: #f44336;
            color: white;
        }

        .btn-taken-dec:hover {
            background: #ef5350;
            transform: scale(1.05);
        }

        .btn-owed-inc {
            background: #FF9800;
            color: white;
        }

        .btn-owed-inc:hover {
            background: #FFB74D;
            transform: scale(1.05);
        }

        .btn-owed-dec {
            background: #9C27B0;
            color: white;
        }

        .btn-owed-dec:hover {
            background: #BA68C8;
            transform: scale(1.05);
        }

        .btn-payoff {
            background: #d4af37;
            color: #1a1a1a;
            grid-column: 1 / -1;
            font-weight: 700;
        }

        .btn-payoff:hover {
            background: #e8c547;
            transform: scale(1.03);
        }

        .section-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .users-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .user-card {
                padding: 20px;
            }

            .stats {
                gap: 15px;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #999;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍺 SHOTGUN TRACKER 🍺</h1>
            <p class="tagline">Track shots taken and shots owed</p>
        </header>

        <div id="app">
            <div class="loading">Loading users...</div>
        </div>
    </div>

    <script>
        class ShotgunTracker {
            constructor() {
                this.appElement = document.getElementById('app');
                this.users = [];
                this.init();
            }

            async init() {
                await this.loadUsers();
                this.render();
            }

            async loadUsers() {
                try {
                    const response = await fetch('/api/users');
                    if (!response.ok) throw new Error('Failed to load users');
                    this.users = await response.json();
                } catch (error) {
                    console.error(error);
                    this.appElement.innerHTML = `<div class="error">Error loading users: ${error.message}</div>`;
                }
            }

            async updateTaken(userId, action) {
                try {
                    const response = await fetch(`/api/users/${userId}/taken`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action, amount: 1 })
                    });
                    if (!response.ok) throw new Error('Failed to update');
                    const updated = await response.json();
                    this.updateUserData(userId, updated);
                    this.render();
                } catch (error) {
                    console.error(error);
                }
            }

            async updateOwed(userId, action) {
                try {
                    const response = await fetch(`/api/users/${userId}/owed`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action, amount: 1 })
                    });
                    if (!response.ok) throw new Error('Failed to update');
                    const updated = await response.json();
                    this.updateUserData(userId, updated);
                    this.render();
                } catch (error) {
                    console.error(error);
                }
            }

            async payOff(userId) {
                try {
                    const response = await fetch(`/api/users/${userId}/pay-off`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ amount: 1 })
                    });
                    if (!response.ok) throw new Error('Failed to pay off');
                    const updated = await response.json();
                    this.updateUserData(userId, updated);
                    this.render();
                } catch (error) {
                    console.error(error);
                }
            }

            updateUserData(userId, updatedUser) {
                const index = this.users.findIndex(u => u.id === userId);
                if (index !== -1) {
                    this.users[index] = updatedUser;
                }
            }

            render() {
                this.appElement.innerHTML = `
                    <div class="users-grid">
                        ${this.users.map(user => this.renderUserCard(user)).join('')}
                    </div>
                `;

                // Attach event listeners
                this.users.forEach(user => {
                    document.querySelector(`[data-user-taken-inc="${user.id}"]`)?.addEventListener('click', () => this.updateTaken(user.id, 'increment'));
                    document.querySelector(`[data-user-taken-dec="${user.id}"]`)?.addEventListener('click', () => this.updateTaken(user.id, 'decrement'));
                    document.querySelector(`[data-user-owed-inc="${user.id}"]`)?.addEventListener('click', () => this.updateOwed(user.id, 'increment'));
                    document.querySelector(`[data-user-owed-dec="${user.id}"]`)?.addEventListener('click', () => this.updateOwed(user.id, 'decrement'));
                    document.querySelector(`[data-user-payoff="${user.id}"]`)?.addEventListener('click', () => this.payOff(user.id));
                });
            }

            renderUserCard(user) {
                return `
                    <div class="user-card">
                        <div class="user-name">${user.name}</div>
                        
                        <div class="stats">
                            <div class="stat">
                                <div class="stat-label">Taken</div>
                                <div class="stat-value">${user.taken}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">Owed</div>
                                <div class="stat-value">${user.owed}</div>
                            </div>
                        </div>

                        <div class="actions">
                            <div class="section-label">Shotguns Taken</div>
                            <div class="action-group">
                                <button class="btn-taken-inc" data-user-taken-inc="${user.id}">+ Add</button>
                                <button class="btn-taken-dec" data-user-taken-dec="${user.id}">- Remove</button>
                            </div>

                            <div class="section-label">Shotguns Owed</div>
                            <div class="action-group">
                                <button class="btn-owed-inc" data-user-owed-inc="${user.id}">+ Add</button>
                                <button class="btn-owed-dec" data-user-owed-dec="${user.id}">- Remove</button>
                            </div>

                            <button class="btn-payoff" data-user-payoff="${user.id}">💰 Pay Off 1 Shot</button>
                        </div>
                    </div>
                `;
            }
        }

        // Initialize the app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            new ShotgunTracker();
        });
    </script>
</body>
</html>
